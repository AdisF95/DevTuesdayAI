services:
  worldcuppy:
    image: ${DOCKER_REGISTRY-}worldcuppy
    build:
      context: .
      dockerfile: WorldCuppy/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: worldcuppy
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Dev@12345!
    volumes:
      - worldcuppy_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  worldcuppy_pgdata:
